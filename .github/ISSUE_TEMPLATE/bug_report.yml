name: Bug report
description: Something broke, misbehaved, or surprised you
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing. Include enough detail that we can reproduce on a similar machine.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, and what went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Output of `sprout env` (redact paths if needed)
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Sprout version
      description: Output of `sprout --version` or npm package version
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this
          required: true